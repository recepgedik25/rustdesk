name: Saynet Help Desk Build

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM, vcpkg & Codegen
        run: |
          choco install llvm -y
          vcpkg integrate install
          vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static --classic
          cargo install flutter_rust_bridge_codegen --version 1.80.1

      - name: Build Saynet Help Desk EXE
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = "C:/vcpkg"
          # vcpkg.json çakışmasını engelle
          Get-ChildItem -Filter "vcpkg.json" -Recurse | Rename-Item -NewName { $_.Name + ".old" } -ErrorAction SilentlyContinue
          
          # 1. Flutter bağımlılıklarını çek
          cd flutter
          flutter pub get
          cd ..
          
          # 2. Köprü dosyalarını oluştur (CRITICAL: Class-name Rustdesk olarak sabitlendi)
          flutter_rust_bridge_codegen --rust-input src/flutter_ffi.rs --rust-output src/bridge_generated.rs --dart-output flutter/lib/generated_bridge.dart --class-name Rustdesk --wasm
          
          # 3. Derlemeyi başlat
          python build.py --flutter
          
          # EXE'NİN YERİNİ BULMAK İÇİN LİSTELEME
          Write-Host "--- Oluşan tüm EXE dosyaları aranıyor ---"
          Get-ChildItem -Path . -Filter *.exe -Recurse

      - name: Upload Finished EXE
        uses: actions/upload-artifact@v4
        with:
          name: Saynet-Help-Desk-Windows-EXE
          # Oluşan ana kurulum dosyasını ve taşınabilir sürümü yakala
          path: |
             rustdesk-*-install.exe
             saynet-*-install.exe
             flutter/build/windows/runner/Release/*.exe
             dist/*.exe
          if-no-files-found: error
