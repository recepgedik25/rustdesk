name: Saynet Help Desk Build

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM & vcpkg Libraries
        run: |
          choco install llvm -y
          vcpkg integrate install
          # --classic ekleyerek manifest modunu devre dışı bırakıyoruz
          vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static --classic

      - name: Build Saynet Help Desk EXE
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = "C:/vcpkg"
          # Sunucuda vcpkg.json varsa her ihtimale karşı ismini değiştiriyoruz
          Get-ChildItem -Filter "vcpkg.json" -Recurse | Rename-Item -NewName { $_.Name + ".old" } -ErrorAction SilentlyContinue
          
          python build.py --flutter

      - name: Upload Finished EXE
        uses: actions/upload-artifact@v4
        with:
          name: Saynet-Help-Desk-Windows-EXE
          path: target/release/*.exe
