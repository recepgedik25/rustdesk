name: Saynet Help Desk Build

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM, vcpkg & Codegen
        run: |
          choco install llvm -y
          vcpkg integrate install
          vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static --classic
          cargo install flutter_rust_bridge_codegen --version 1.80.1

      - name: Build Saynet Help Desk EXE
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = "C:/vcpkg"
          Get-ChildItem -Filter "vcpkg.json" -Recurse | Rename-Item -NewName { $_.Name + ".old" } -ErrorAction SilentlyContinue
          
          cd flutter
          flutter pub get
          cd ..
          
          # Köprü ayarı
          flutter_rust_bridge_codegen --rust-input src/flutter_ffi.rs --rust-output src/bridge_generated.rs --dart-output flutter/lib/generated_bridge.dart --class-name Rustdesk --wasm
          
          # ÖNEMLİ: Uygulama ismini ve Sunucu ayarlarını derleme anında gömüyoruz
          # NOT: "SUNUCU_ADRESIN" ve "KEY_BILGIN" kısımlarını kendi bilgilerinle değiştirebilirsin
          python build.py --flutter --app-name "Saynet Help Desk" --server "SUNUCU_ADRESIN" --key "KEY_BILGIN"
          
          # Çıktıları topla
          Write-Host "--- Kurulum dosyaları hazırlanıyor ---"
          mkdir output_folder
          Get-ChildItem -Path . -Filter *.exe -Recurse | ForEach-Object {
              if ($_.Name -like "*install*") {
                  Copy-Item $_.FullName -Destination "./output_folder/Saynet_Kurulum.exe"
              } else {
                  Copy-Object $_.FullName -Destination "./output_folder/$($_.Name)"
              }
          }

      - name: Upload Finished EXE
        uses: actions/upload-artifact@v4
        with:
          name: Saynet-Help-Desk-Full-Package
          path: output_folder/
          if-no-files-found: error
