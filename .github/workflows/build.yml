name: Saynet Help Desk Build

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM, vcpkg & Codegen
        run: |
          choco install llvm -y
          vcpkg integrate install
          vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static --classic
          cargo install flutter_rust_bridge_codegen --version 1.80.1

      - name: Build Saynet Help Desk EXE
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = "C:/vcpkg"
          Get-ChildItem -Filter "vcpkg.json" -Recurse | Rename-Item -NewName { $_.Name + ".old" } -ErrorAction SilentlyContinue
          cd flutter
          flutter pub get
          cd ..
          
          # Köprü dosyalarını oluştur
          flutter_rust_bridge_codegen --rust-input src/flutter_ffi.rs --rust-output src/bridge_generated.rs --dart-output flutter/lib/generated_bridge.dart --class-name Rustdesk --wasm
          
          # Derlemeyi başlat
          python build.py --flutter
          
          # EXE dosyasını bul ve ana dizine taşı (Garantilemek için)
          Write-Host "--- EXE dosyasını topluyorum ---"
          Get-ChildItem -Path . -Filter *.exe -Recurse | ForEach-Object {
              Write-Host "Bulunan Dosya: $($_.FullName)"
              Copy-Item $_.FullName -Destination "./SAYNET_OUTPUT.exe" -ErrorAction SilentlyContinue
          }

      - name: Upload Finished EXE
        uses: actions/upload-artifact@v4
        with:
          name: Saynet-Help-Desk-Final-EXE
          # Sadece kopyaladığımız dosyayı alıyoruz
          path: "SAYNET_OUTPUT.exe"
          if-no-files-found: error
