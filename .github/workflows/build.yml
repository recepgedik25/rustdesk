name: Saynet Help Desk Build

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM, vcpkg & Codegen
        run: |
          choco install llvm -y
          vcpkg integrate install
          vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static --classic
          cargo install flutter_rust_bridge_codegen --version 1.80.1

      - name: Build Saynet Help Desk EXE
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = "C:/vcpkg"
          # vcpkg.json çakışmalarını önlemek için geçici isim değişikliği
          Get-ChildItem -Filter "vcpkg.json" -Recurse | Rename-Item -NewName { $_.Name + ".old" } -ErrorAction SilentlyContinue
          
          # 1. Flutter hazırlığı
          cd flutter
          flutter pub get
          cd ..
          
          # 2. Köprü (Bridge) dosyalarını oluşturma
          # Class name'i Rustdesk yaparak Flutter tarafındaki "Not Found" hatalarını engelliyoruz
          flutter_rust_bridge_codegen --rust-input src/flutter_ffi.rs --rust-output src/bridge_generated.rs --dart-output flutter/lib/generated_bridge.dart --class-name Rustdesk --wasm
          
          # 3. Derlemeyi başlat (Python'un tanımadığı hatalı parametreleri kaldırdık)
          python build.py --flutter
          
          # 4. Çıktıları organize etme
          Write-Host "--- Çıktı Klasörü Hazırlanıyor ---"
          New-Item -ItemType Directory -Force -Path "./output_folder"
          
          # Oluşan EXE'leri tarayıp anlaşılır isimlerle kopyalıyoruz
          Get-ChildItem -Path . -Filter *.exe -Recurse | ForEach-Object {
              Write-Host "Dosya Bulundu: $($_.FullName)"
              if ($_.FullName -like "*install*") {
                  Copy-Item $_.FullName -Destination "./output_folder/Saynet_Destek_Kurulum.exe" -Force
              } elseif ($_.FullName -like "*release*" -and $_.Name -notlike "*build_script*") {
                  Copy-Item $_.FullName -Destination "./output_folder/Saynet_Destek_Tasınabilir.exe" -Force
              }
          }

      - name: Upload Finished EXE
        uses: actions/upload-artifact@v4
        with:
          name: Saynet-Help-Desk-Final-Files
          path: output_folder/
          if-no-files-found: error
